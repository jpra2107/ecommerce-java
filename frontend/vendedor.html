<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Vendedor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="panel-container">
    <h2>Bienvenido Vendedor</h2>

    <div style="text-align:center; margin-bottom:20px;">
      <label for="idVendedor">ID Vendedor:</label>
      <input type="text" id="idVendedor" value="3">
      <button onclick="verPedidos()">Ver pedidos</button>
    </div>

    <div id="resultado"></div>
  </div>

      let html = "<table border='1'><tr><th>ID Pedido</th><th>ID Cliente</th><th>Fecha</th><th>Estado</th><th>Prioridad</th><th>Acción</th></tr>";
      data.forEach(pedido => {
        html += `<tr>
          <td>${pedido.id_pedido}</td>
          <td>${pedido.id_cliente}</td>
          <td>${new Date(pedido.fecha).toLocaleDateString()}</td>
          <td>${pedido.estado}</td>
          <td>${pedido.prioridad}</td>
          <td>
            <select onchange="cambiarPrioridad(${pedido.id_pedido}, this.value)">
              <option value="">Cambiar...</option>
              <option value="alta">Alta</option>
              <option value="media">Media</option>
              <option value="baja">Baja</option>
            </select>
          </td>
        </tr>`;
      });
      html += "</table>";

      document.getElementById("resultado").innerHTML = html;
    }

    async function cambiarPrioridad(id_pedido, prioridad) {
      if (!prioridad) return;

      const res = await fetch(`http://localhost:3000/vendedor/prioridad/${id_pedido}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prioridad })
      });
      const data = await res.json();
      alert(`Pedido ${id_pedido} actualizado: ${JSON.stringify(data)}`);
      verPedidos(); // refresca la tabla
    }
  </script>

</html>
